<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pavelski Zope Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-panel">
        <p class="eyebrow">Ferramenta nacional de cobertura</p>
        <h1>Pavelski Zope Map</h1>
        <p class="help-text">
          Zonas ativas vêm do arquivo <code>work_zones.json</code>. Áreas mais populosas recebem destaque automático, com rank por estado e ZIP líder por zona.
        </p>

        <div class="controls">
          <label for="zip3-filter">Buscar estado, ZIP3 ou cidade</label>
          <input id="zip3-filter" type="text" placeholder="Ex: NY-100, PA, Charlotte" />
        </div>

        <div class="switches">
          <label>
            <input id="toggle-cities" type="checkbox" checked />
            Mostrar cidades
          </label>
          <label>
            <input id="toggle-zip3-labels" type="checkbox" checked />
            Mostrar rótulos ZIP3
          </label>
          <label>
            <input id="toggle-hotspots" type="checkbox" checked />
            Destacar zonas mais populosas
          </label>
        </div>

        <div id="stats" class="stats" aria-live="polite"></div>
        <div id="zone-list" class="zone-list" aria-label="Lista de zonas ZIP3"></div>
      </aside>

      <main class="map-area">
        <div id="map"></div>
        <div class="legend">
          <span class="swatch"></span>
          Zona ativa (transparente)
          <span class="swatch hotspot"></span>
          Hotspot populacional
        </div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./app.js?v=all-us-v1"></script>
  </body>
</html>
